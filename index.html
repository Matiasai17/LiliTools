<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/LiliTools/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="LiliTools — suite de herramientas web de Liliana. Utilidades prácticas, todo en un solo lugar."
    />
    <meta name="theme-color" content="#e42320" />

    <!-- Tipografía de marca: Nunito (sans humanista redondeada, coherente con el wordmark). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap"
      rel="stylesheet"
    />

    <title>LiliTools — Herramientas de Liliana</title>

    <!-- Aplica el tema antes de pintar la página: evita el "flash" del tema
         equivocado al cargar. Se repite la misma lógica en useTheme.js. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('lilitools-theme')
          var theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
          document.documentElement.setAttribute('data-theme', theme)
        } catch (e) {
          /* localStorage puede estar bloqueado (modo privado); seguimos en claro. */
        }
      })()
    </script>
    <script type="module" crossorigin src="/LiliTools/assets/index-Dn9LLgyO.js"></script>
    <link rel="stylesheet" crossorigin href="/LiliTools/assets/index-BWP3tJw0.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
